<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Terminal background -->
  <rect width="48" height="48" rx="8" fill="#0a0f0a"/>

  <!-- Scanline texture -->
  <rect width="48" height="48" rx="8" fill="url(#scan)" opacity="0.04"/>

  <!-- Top bar (title bar) -->
  <rect width="48" height="9" rx="8" fill="#111811"/>
  <rect y="5" width="48" height="4" fill="#111811"/>

  <!-- Title bar dots -->
  <circle cx="7" cy="4.5" r="1.5" fill="#ff5f57" opacity="0.8"/>
  <circle cx="12" cy="4.5" r="1.5" fill="#febc2e" opacity="0.8"/>
  <circle cx="17" cy="4.5" r="1.5" fill="#28c840" opacity="0.8"/>

  <!-- Prompt line: >_ k -->
  <g filter="url(#glow)" fill="#4ade80" font-family="monospace">
    <!-- > chevron -->
    <text x="5" y="30" font-size="11" fill="#4ade80" opacity="0.9">&#62;</text>
    <!-- underscore cursor -->
    <text x="13" y="30" font-size="11" fill="#4ade80" opacity="0.7">_</text>
    <!-- k -->
    <text x="20" y="30" font-size="11" fill="#86efac">k</text>
  </g>

  <!-- Blinking cursor block -->
  <rect x="29" y="21" width="6" height="10" rx="1" fill="#4ade80" opacity="0.85"/>

  <!-- Second dim line suggesting history -->
  <text x="5" y="42" font-size="7" fill="#4ade80" opacity="0.25" font-family="monospace">kubectl get pods</text>
</svg>
